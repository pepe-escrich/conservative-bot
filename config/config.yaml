schedule:
  time: "07:00"                # hora local de lanzamiento de los trades diarios
  timezone: Europe/Madrid

# --- Valores optimizados por el estudio Optuna del 2026-07-06 ---------------
# (data/studies/study_20260706_2322.md · OOS: +27.9% en 29 días, DD 6.3%, PF 1.62)
# Los valores originales del diseño (3 trades/día, 10x, escalones de 1% de PnL
# sobre margen, RR 1:3) perdían dinero: las comisiones se comían los escalones.

trades_per_day: 2              # nº de trades que se abren cada día
min_score: 0.166               # puntuación mínima (|score|) para considerar un token

leverage: 3
capital_inicial: 1000          # USDT, para paper y backtest
risk_per_trade_pct: 1.86       # % del equity que se pierde si salta el SL inicial

sizing:
  mode: risk                   # 'risk' (por riesgo al SL) o 'capital_fraction' (% fijo del capital como margen)
  capital_fraction_pct: 10     # solo para capital_fraction: % del capital al inicio del día por trade

risk_reward: 4.18              # TP a 4.18R

entry:
  # OOS jun-jul 2026: pullback 0.3% iguala el retorno de mercado (+27.4% vs +27.9%)
  # con mejor PF (1.69 vs 1.62) y -42% de comisiones. Retrocesos mayores pierden
  # los mejores trades (0.5% -> +12%, 1% -> +4.5%): no esperar mucho al momentum.
  mode: pullback_limit         # 'market' o 'pullback_limit' (limitada a un retroceso)
  pullback_pct: 0.3            # % de retroceso desde el precio de la señal
  timeout_hours: 6             # validez de la orden limitada
  on_timeout: cancel           # 'cancel' o 'market' al expirar sin fill

stop:
  atr_mult: 2.99               # distancia del SL en múltiplos de ATR
  atr_period: 14

steps:                         # gestión por escalones de beneficio
  basis: price                 # 'margin_pnl' (% PnL sobre margen) o 'price' (% de precio)
  step_pct: 5.9                # tamaño del escalón
  partial_close_pct: 68.4      # % de la posición restante que se cierra en cada escalón
  trail_mode: breakeven_only   # 'previous_step' o 'breakeven_only'

fees:
  taker_pct: 0.05              # comisión taker por fill (% del notional)
  maker_pct: 0.02              # comisión maker (órdenes limitadas de entrada)
  slippage_pct: 0.02           # deslizamiento estimado por fill (% del precio)

indicators:                    # pesos del scoring (se normalizan a suma 1)
  ema_trend: 0.519
  rsi: 0.866
  macd: 0.975
  adx: 0.154
  bollinger: 0.747
  frvp: 0.305

timeframes:
  signal: 1h                   # indicadores de señal
  trend: 4h                    # contexto de tendencia
  management: 5m               # gestión intradía de trades (backtest)

frvp:
  lookback_days: 14
  value_area_pct: 70
  bins: 100

paper:
  enabled: false               # si true, el runner de paper trading arranca con la API
  poll_seconds: 15
