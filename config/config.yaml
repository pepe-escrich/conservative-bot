# Configuración del bot. Todos los parámetros operativos viven aquí.

exchange: okx                  # id de ccxt: okx, bingx, binance...

# Catálogo de tokens (perpetuos USDT de OKX, formato ccxt).
# Regenerar con: python -m bot universe --top 50  (top capitalización ∩ perps del exchange)
universe:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - BNB/USDT:USDT
  - XRP/USDT:USDT
  - SOL/USDT:USDT
  - TRX/USDT:USDT
  - HYPE/USDT:USDT
  - DOGE/USDT:USDT
  - ZEC/USDT:USDT
  - ADA/USDT:USDT
  - XLM/USDT:USDT
  - LINK/USDT:USDT
  - LAB/USDT:USDT
  - CC/USDT:USDT
  - BCH/USDT:USDT
  - GRAM/USDT:USDT
  - LTC/USDT:USDT
  - HBAR/USDT:USDT
  - SUI/USDT:USDT
  - AVAX/USDT:USDT
  - NEAR/USDT:USDT
  - SHIB/USDT:USDT
  - TAO/USDT:USDT
  - UNI/USDT:USDT
  - WLFI/USDT:USDT
  - ASTER/USDT:USDT
  - ONDO/USDT:USDT
  - DOT/USDT:USDT
  - AAVE/USDT:USDT
  - WLD/USDT:USDT
  - SKY/USDT:USDT
  - MORPHO/USDT:USDT
  - ICP/USDT:USDT
  - PI/USDT:USDT
  - PEPE/USDT:USDT
  - ETC/USDT:USDT
  - QNT/USDT:USDT
  - STABLE/USDT:USDT
  - RENDER/USDT:USDT
  - ATOM/USDT:USDT
  - POL/USDT:USDT
  - ALGO/USDT:USDT
  - JUP/USDT:USDT
  - BEAT/USDT:USDT
  - ENA/USDT:USDT
  - PUMP/USDT:USDT
  - LIT/USDT:USDT
  - FIL/USDT:USDT
  - VVV/USDT:USDT
  - NIGHT/USDT:USDT

schedule:
  time: "07:00"                # hora local de lanzamiento de los trades diarios
  timezone: Europe/Madrid

trades_per_day: 3              # nº de trades que se abren cada día
min_score: 0.3                 # puntuación mínima (|score|) para considerar un token

leverage: 10
capital_inicial: 1000          # USDT, para paper y backtest
risk_per_trade_pct: 1.0        # % del equity que se pierde si salta el SL inicial

risk_reward: 3                 # setup 1:3 -> TP a 3R

stop:
  atr_mult: 1.5                # distancia del SL en múltiplos de ATR
  atr_period: 14

steps:                         # gestión por escalones de beneficio
  basis: margin_pnl            # 'margin_pnl' (% PnL sobre margen) o 'price' (% de precio)
  step_pct: 1.0                # tamaño del escalón
  partial_close_pct: 50        # % de la posición restante que se cierra en cada escalón
  trail_mode: previous_step    # 'previous_step' o 'breakeven_only'

fees:
  taker_pct: 0.05              # comisión taker por fill (% del notional)
  slippage_pct: 0.02           # deslizamiento estimado por fill (% del precio)

indicators:                    # pesos del scoring (se normalizan a suma 1)
  ema_trend: 0.25
  rsi: 0.15
  macd: 0.15
  adx: 0.10
  bollinger: 0.10
  frvp: 0.25

timeframes:
  signal: 1h                   # indicadores de señal
  trend: 4h                    # contexto de tendencia
  management: 5m               # gestión intradía de trades (backtest)

frvp:
  lookback_days: 14
  value_area_pct: 70
  bins: 100

paper:
  enabled: false               # si true, el runner de paper trading arranca con la API
  poll_seconds: 15
