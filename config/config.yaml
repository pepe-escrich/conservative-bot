# Configuración del bot. Todos los parámetros operativos viven aquí.

exchange: okx                  # id de ccxt: okx, bingx, binance...

# Catálogo: las 30 bases cripto con X-Perp en OKX EU producción (eea.okx.com).
# En EU los perps estándar (SWAP) están bloqueados por compliance (error 51155, MiCA/MiFID);
# solo son operables los X-Perps regulados (FUTURES, BASE-USD_UM_XPERP). Se representan como
# BASE/USDT:USDT porque los X-Perps (~3 meses de histórico) no dan para backtest de 2 años:
# indicadores y backtest usan el perp USDT como proxy del mismo subyacente. El broker mapea
# a BASE-USD_UM_XPERP al ejecutar en producción (fase 2).
universe:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - BNB/USDT:USDT
  - XRP/USDT:USDT
  - SOL/USDT:USDT
  - TRX/USDT:USDT
  - HYPE/USDT:USDT
  - DOGE/USDT:USDT
  - ZEC/USDT:USDT
  - ADA/USDT:USDT
  - XLM/USDT:USDT
  - LINK/USDT:USDT
  - BCH/USDT:USDT
  - GRAM/USDT:USDT
  - LTC/USDT:USDT
  - SUI/USDT:USDT
  - AVAX/USDT:USDT
  - NEAR/USDT:USDT
  - TAO/USDT:USDT
  - AAVE/USDT:USDT
  - WLD/USDT:USDT
  - ICP/USDT:USDT
  - PEPE/USDT:USDT
  - RENDER/USDT:USDT
  - BEAT/USDT:USDT
  - ENA/USDT:USDT
  - PUMP/USDT:USDT
  - LIT/USDT:USDT
  - VVV/USDT:USDT
  - ONDO/USDT:USDT

schedule:
  time: "07:00"                # hora local de lanzamiento de los trades diarios
  timezone: Europe/Madrid

# --- Valores optimizados por el estudio Optuna del 2026-07-08 (2 años, 30 X-Perps) ---
# (data/studies/study_20260708_2044.md · IS +672% / OOS +285% (2025-10→2026-07),
#  wr 45%, PF 1.35, DD 32-37%). Auditoría sin bug (wr/PF modestos, fills realistas,
#  sin lookahead). AVISO: el OOS es la MISMA tendencia alcista 2024-26 (no un régimen
#  distinto) → los 285% son optimistas si el mercado gira; estrategia validada en alcista.
#  Cambios vs estudio anterior (2026-07-06): entrada market, trailing previous_step,
#  SL más ajustado (1.78 ATR), min_score estricto (0.579), pesos con ADX al alza.

trades_per_day: 3              # nº de trades que se abren cada día
min_score: 0.579               # puntuación mínima (|score|) para considerar un token

leverage: 3
capital_inicial: 1000          # USDT, para paper y backtest
risk_per_trade_pct: 1.76       # % del equity que se pierde si salta el SL inicial

sizing:
  mode: risk                   # 'risk' (por riesgo al SL) o 'capital_fraction' (% fijo del capital como margen)
  capital_fraction_pct: 10     # solo para capital_fraction: % del capital al inicio del día por trade

risk_reward: 4.23              # TP a 4.23R

entry:
  # Estudio 2y: market entra mejor que pullback en el tramo alcista (no perder el momentum).
  mode: market                 # 'market' o 'pullback_limit' (limitada a un retroceso)
  pullback_pct: 1.06           # % de retroceso desde el precio de la señal (sólo pullback_limit)
  timeout_hours: 22.5          # validez de la orden limitada (sólo pullback_limit)
  on_timeout: cancel           # 'cancel' o 'market' al expirar sin fill

stop:
  atr_mult: 1.78               # distancia del SL en múltiplos de ATR
  atr_period: 14

steps:                         # gestión por escalones de beneficio
  basis: price                 # 'margin_pnl' (% PnL sobre margen) o 'price' (% de precio)
  step_pct: 4.72               # tamaño del escalón
  partial_close_pct: 75.4      # % de la posición restante que se cierra en cada escalón
  trail_mode: previous_step    # 'previous_step' o 'breakeven_only'

fees:
  taker_pct: 0.05              # comisión taker por fill (% del notional)
  maker_pct: 0.02              # comisión maker (órdenes limitadas de entrada)
  slippage_pct: 0.02           # deslizamiento estimado por fill (% del precio)

indicators:                    # pesos del scoring (se normalizan a suma 1)
  ema_trend: 0.577
  rsi: 0.187
  macd: 0.431
  adx: 0.635
  bollinger: 0.088
  frvp: 0.207

timeframes:
  signal: 1h                   # indicadores de señal
  trend: 4h                    # contexto de tendencia
  management: 5m               # gestión intradía de trades (backtest)

frvp:
  lookback_days: 14
  value_area_pct: 70
  bins: 100

paper:
  enabled: false               # (modo clásico) si true, el runner arranca con la API
  poll_seconds: 15

execution:
  mode: paper                  # 'paper' (simulado) u 'okx' (X-Perps reales vía python-okx)
  # Fase 2 (producción): mode: okx + product: xperp. Las claves demo de OKX EU no pueden
  # operar perps estándar (51155); el broker mapea a X-Perps (FUTURES, BASE-USD_UM_XPERP).
  domain: https://eea.okx.com  # OKX Europa; global: https://www.okx.com
  demo: true                   # true = demo trading (flag 1). Keys en el fichero .env
